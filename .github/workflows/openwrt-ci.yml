name: 编译 OpenWrt 固件

on:
  workflow_dispatch:
    inputs:
      DEVICE_MODEL:
        description: '设备选择'
        required: true
        type: choice
        options:
          - CW-N5105
          - Wyse 3040
          - 歌华链 MT7621
          - P&W R619AC
          - 京东云雅典娜 AX6600
        default: 'CW-N5105'

permissions:
  contents: read

env:
  DEVICE_MODEL: ${{ inputs.DEVICE_MODEL }}

jobs:
  build_openwrt:
    name: 编译 ${{ inputs.DEVICE_MODEL }} 固件
    runs-on: ubuntu-22.04
    
    steps:
      - name: 清理磁盘空间并初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker image prune -f
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt update
          sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap*
          sudo -E apt -y full-upgrade
          sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E systemctl daemon-reload
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      - name: 拉取源代码
        uses: actions/checkout@v4

      - name: 释放 Ubuntu 运行环境磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
  
      - name: 磁盘空间释放完成状态
        run: |
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      - name: 生成安全的缓存前缀
        id: set-prefix  # 核心修改 1：给这一步赋予一个唯一的 ID
        run: |
          SAFE_MODEL=$(echo "${{ env.DEVICE_MODEL }}" | sed 's/[^a-zA-Z0-9]/-/g')
          echo "prefix=$SAFE_MODEL" >> $GITHUB_OUTPUT  # 核心修改 2：写入到官方的 output 通道中

      - name: 配置原生编译缓存 (CCache & Toolchain)
        uses: actions/cache@v4
        with:
          path: |
            .ccache
            staging_dir/host*
            staging_dir/toolchain-*
          key: ${{ runner.os }}-wrtbuild-${{ steps.set-prefix.outputs.prefix }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-wrtbuild-${{ steps.set-prefix.outputs.prefix }}-
            
      - name: 设置 CCache 环境变量
        run: |
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> $GITHUB_ENV

      - name: 配置下载缓存 (DL 目录)
        uses: actions/cache@v4
        env:
          cache-name: cache-openwrt-dl
        with:
          path: dl
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            
      - name: 更新定制源
        run: |
          sed -i '$a src-git helloworld https://github.com/fw876/helloworld' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # ========== 核心修复：替换为稳定的第三方组件 ==========
          # 1. 删除刚拉取下来的、自带的残缺组件
          rm -rf feeds/packages/net/mosdns
          rm -rf feeds/luci/applications/luci-app-mosdns
          rm -rf feeds/packages/net/v2ray-geodata
          rm -rf feeds/packages/utils/v2dat   # <--- 新增：删除坏掉的 v2dat
          
          # 2. 拉取 sbwml 修复版组件，放入 package 目录
          git clone https://github.com/sbwml/luci-app-mosdns -b v5 package/mosdns
          git clone https://github.com/sbwml/v2ray-geodata package/v2ray-geodata
          git clone https://github.com/sbwml/v2dat package/v2dat   # <--- 新增：拉取稳定的 v2dat
          # ============================================================
          
      - name: 生成配置文件
        run: |
          rm -f ./.config*
          touch ./.config
          
          # ======================== 设备与独立插件配置 ========================
          if [ "$DEVICE_MODEL" = "CW-N5105" ]; then

          cat >> .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_KERNEL_PARTSIZE=32
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_EFI_IMAGES=y
          CONFIG_GRUB_TITLE="CW-N5105"

          # 多文件系统与 USB 3.0 支持
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          CONFIG_PACKAGE_kmod-fs-squashfs=y
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb-ohci-pci=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb2-pci=y
          CONFIG_PACKAGE_kmod-usb3=y

          # Samba4
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_samba4-server=y

          # N5105 大内存插件全家桶
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-aria2=y
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-app-diskman_INCLUDE_kmod_md_linear=y
          CONFIG_PACKAGE_luci-app-diskman_INCLUDE_kmod_md_raid456=y
          CONFIG_PACKAGE_luci-app-diskman_INCLUDE_mdadm=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-app-minidlna=y
          CONFIG_PACKAGE_luci-app-music-remote-center=y
          CONFIG_PACKAGE_luci-app-mwan3=y
          CONFIG_PACKAGE_luci-app-mwan3helper=y
          CONFIG_PACKAGE_luci-app-netdata=y
          CONFIG_PACKAGE_luci-app-wechatpush=y
          CONFIG_PACKAGE_luci-app-filetransfer=y
          CONFIG_PACKAGE_luci-app-lucky=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-syncdial=y
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          CONFIG_PACKAGE_luci-app-usb-printer=y
          CONFIG_PACKAGE_luci-app-uugamebooster=y
          CONFIG_PACKAGE_luci-app-wrtbwmon=y
          EOF

          elif [ "$DEVICE_MODEL" = "Wyse 3040" ]; then

          # Wyse 3040 专属底层架构 (x86_64, UEFI引导)
          cat >> .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_KERNEL_PARTSIZE=32
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_EFI_IMAGES=y
          CONFIG_GRUB_TITLE="Wyse 3040"

          # ========== 核心修改：禁用串口控制台输出，防止启动卡死 ==========
          # 取消默认的 ttyS0 串口输出
          # CONFIG_GRUB_SERIAL is not set
          CONFIG_GRUB_SERIAL=""
          # 保留基础屏幕 VGA 显示
          CONFIG_GRUB_CONSOLE=y
          CONFIG_GRUB_BOOTOPTS=""
          # ================================================================

          # 网卡驱动 (内置螃蟹卡) 与 eMMC 驱动支持
          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-sdhci-acpi=y

          # 多文件系统与 USB 支持
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          CONFIG_PACKAGE_kmod-fs-squashfs=y
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb-ohci-pci=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb2-pci=y
          CONFIG_PACKAGE_kmod-usb3=y

          # 2G内存/8G闪存的进阶插件组合
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-aria2=y
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-app-diskman_INCLUDE_kmod_md_linear=y
          CONFIG_PACKAGE_luci-app-diskman_INCLUDE_kmod_md_raid456=y
          CONFIG_PACKAGE_luci-app-diskman_INCLUDE_mdadm=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-app-minidlna=y
          CONFIG_PACKAGE_luci-app-music-remote-center=y
          CONFIG_PACKAGE_luci-app-mwan3=y
          CONFIG_PACKAGE_luci-app-mwan3helper=y
          CONFIG_PACKAGE_luci-app-netdata=y
          CONFIG_PACKAGE_luci-app-wechatpush=y
          CONFIG_PACKAGE_luci-app-filetransfer=y
          CONFIG_PACKAGE_luci-app-lucky=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-syncdial=y
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          CONFIG_PACKAGE_luci-app-usb-printer=y
          CONFIG_PACKAGE_luci-app-uugamebooster=y
          CONFIG_PACKAGE_luci-app-wrtbwmon=y

          # Samba4 局域网共享
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_samba4-server=y
          EOF
          elif [ "$DEVICE_MODEL" = "歌华链 MT7621" ]; then
          cat >> .config <<EOF
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_gehua_ghl-r-001=y
          
          # MT7621 常用实用插件 (轻量级组合)
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-autoreboot=y
          CONFIG_PACKAGE_luci-app-filetransfer=y
          CONFIG_PACKAGE_luci-app-wol=y
          EOF
          elif [ "$DEVICE_MODEL" = "P&W R619AC" ]; then

          # P&W R619AC 专属底层架构 (IPQ40xx)
          cat >> .config <<EOF
          CONFIG_TARGET_ipq40xx=y
          CONFIG_TARGET_ipq40xx_generic=y
          CONFIG_TARGET_ipq40xx_generic_DEVICE_p2w_r619ac-128m=y

          # 确认使用优化版的 ath10k-ct 无线驱动及固件
          CONFIG_PACKAGE_kmod-ath10k-ct=y
          CONFIG_PACKAGE_ath10k-firmware-qca4019-ct=y

          # R619AC 实用插件 
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-app-lucky=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-autoreboot=y
          CONFIG_PACKAGE_luci-app-filetransfer=y
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          EOF

          elif [ "$DEVICE_MODEL" = "京东云雅典娜 AX6600" ]; then

          # 雅典娜 专属底层架构 (IPQ60xx)
          cat >> .config <<EOF
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq60xx=y
          CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02=y

          # 开启高通 NSS 硬件加速 (IPQ60xx 必备)
          CONFIG_PACKAGE_kmod-qca-nss-dp=y
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y

          # 内存较大，可以上稍微进阶的组合
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-app-lucky=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          CONFIG_PACKAGE_luci-app-autoreboot=y
          CONFIG_PACKAGE_luci-app-filetransfer=y


          # 可选: 雅典娜性能和内存都不错，开启 Dockerman 玩容器
          CONFIG_PACKAGE_luci-app-dockerman=y

          # 多文件系统支持 (考虑到可能插外置存储)
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          EOF
          # ========== 新增的防呆报错机制 ==========
          else
            echo "错误：未知的设备型号 '$DEVICE_MODEL'！请检查下拉菜单的名称和 if 语句是否一致。"
            exit 1
          # =======================================
          fi
          # ======================== 以下为所有设备通用的基础设置 ========================
          
          # IPv6支持
          cat >> .config <<EOF
          CONFIG_PACKAGE_dnsmasq_full_dhcpv6=y
          CONFIG_PACKAGE_ipv6helper=y
          EOF
          
          # 禁用有兼容性问题的 ksmbd
          cat >> .config <<EOF
          # CONFIG_PACKAGE_ksmbd-server is not set
          # CONFIG_PACKAGE_luci-app-ksmbd is not set
          # CONFIG_PACKAGE_kmod-fs-ksmbd is not set
          # CONFIG_PACKAGE_autosamba is not set
          EOF
          
          # 必备核心组件
          cat >> .config <<EOF
          CONFIG_PACKAGE_luci-app-uhttpd=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget=y
          EOF
          
          # 基础 LuCI 主题
          cat >> .config <<EOF
          CONFIG_PACKAGE_luci-theme-design=y
          EOF
          
          # 取消编译VMware镜像
          cat >> .config <<EOF
          # CONFIG_TARGET_IMAGES_PAD is not set
          # CONFIG_ISO_IMAGES=y
          EOF
          
          # ======================== 固件定制部分结束 ========================
          echo -e 'CONFIG_DEVEL=y\nCONFIG_CCACHE=y' >> .config
          make defconfig
          
          # ========== 终极屠龙刀：在 defconfig 之后强制阉割故障驱动 ==========
          if [ "$DEVICE_MODEL" = "歌华链 MT7621" ]; then
            echo "正在从最终配置中强行抹除 mt7603/mt76x2 等无关且报错的驱动..."
            sed -i 's/CONFIG_PACKAGE_kmod-mt7603e=m/# CONFIG_PACKAGE_kmod-mt7603e is not set/g' .config
            sed -i 's/CONFIG_PACKAGE_kmod-mt7603e=y/# CONFIG_PACKAGE_kmod-mt7603e is not set/g' .config
            sed -i 's/CONFIG_PACKAGE_kmod-mt76x2e=m/# CONFIG_PACKAGE_kmod-mt76x2e is not set/g' .config
            sed -i 's/CONFIG_PACKAGE_kmod-mt76x2e=y/# CONFIG_PACKAGE_kmod-mt76x2e is not set/g' .config
            sed -i 's/CONFIG_PACKAGE_kmod-mt7615e=m/# CONFIG_PACKAGE_kmod-mt7615e is not set/g' .config
            sed -i 's/CONFIG_PACKAGE_kmod-mt7615e=y/# CONFIG_PACKAGE_kmod-mt7615e is not set/g' .config
            sed -i 's/CONFIG_PACKAGE_kmod-mt7615-firmware=m/# CONFIG_PACKAGE_kmod-mt7615-firmware is not set/g' .config
            sed -i 's/CONFIG_PACKAGE_kmod-mt7615-firmware=y/# CONFIG_PACKAGE_kmod-mt7615-firmware is not set/g' .config
          fi
          # ===================================================================
          
          # 网络配置修改 (仅修改默认 IP，其余保持系统默认)
          if [ -f ./package/lean/default-settings/files/zzz-default-settings ]; then
            sed -i "2i # network config" ./package/lean/default-settings/files/zzz-default-settings
            sed -i "3i uci set network.lan.ipaddr='10.10.10.1'" ./package/lean/default-settings/files/zzz-default-settings
            sed -i "4i uci commit network\n" ./package/lean/default-settings/files/zzz-default-settings
          fi
          
      - name: 下载依赖包
        run: make download -j16
          
      - name: 编译固件
        run: |
          make -j$(nproc) || make -j1 V=s
          echo "======================="
          echo "磁盘空间使用情况:"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1 ./ --exclude=build_dir --exclude=bin
          du -h --max-depth=1 ./build_dir
          du -h --max-depth=1 ./bin
          
      - name: 整理打包文件
        run: |
          mkdir -p ./artifact/package
          mkdir -p ./artifact/buildinfo
          rm -rf $(find ./bin/targets/ -type d -name "packages")
          cp -rf $(find ./bin/packages/ -type f -name "*.ipk") ./artifact/package/
          cp -rf $(find ./bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/
          
      - name: 上传编译信息
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.DEVICE_MODEL }}_编译信息_buildinfo
          path: ./artifact/buildinfo/

      - name: 上传所有软件包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.DEVICE_MODEL }}_离线插件包_package
          path: ./artifact/package/

      - name: 上传最终固件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.DEVICE_MODEL }}_固件
          path: ./bin/targets/
